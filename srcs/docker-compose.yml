version: '3.8'

services:

  # ma base de données
  mariadb:
    build: ./requirements/mariadb
    container_name: mariadb
    restart: always
    env_file:
      - .env
    # je persiste les données dans un volume pour qu'elles survivent au restart
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - inception

  # wordpress tourne via php-fpm, pas de nginx dedans
  wordpress:
    build: ./requirements/wordpress
    container_name: wordpress
    restart: always
    # j'attends que mariadb soit up avant de démarrer
    depends_on:
      - mariadb
    env_file:
      - .env
    volumes:
      - wordpress_data:/var/www/wordpress
    networks:
      - inception
    # j'expose le port 9000 uniquement aux autres containers, pas à l'hôte
    expose:
      - "9000"

  # nginx est le seul point d'entrée, il gère le HTTPS
  nginx:
    build: ./requirements/nginx
    container_name: nginx
    restart: always
    # je publie le port 445 de l'hôte vers le 443 du container
    ports:
      - "445:443"
    depends_on:
      - wordpress
    env_file:
      - .env
    # nginx a besoin des fichiers php de wordpress pour les passer à php-fpm
    volumes:
      - wordpress_data:/var/www/wordpress
    networks:
      - inception

volumes:
  # je pointe vers un dossier réel sur l'hôte pour garder les données
  mariadb_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/nsmail/data/mariadb

  wordpress_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/nsmail/data/wordpress

# réseau bridge isolé, les containers se parlent par leur nom de service
networks:
  inception:
    driver: bridge
