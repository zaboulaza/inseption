events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    server {
        # Port 443 uniquement - obligatoire selon le sujet
        listen 443 ssl;

        # TLSv1.2 et TLSv1.3 uniquement - obligatoire selon le sujet
        ssl_protocols TLSv1.2 TLSv1.3;

        # Certificat SSL généré dans le Dockerfile
        ssl_certificate /etc/nginx/ssl/inception.crt;
        ssl_certificate_key /etc/nginx/ssl/inception.key;

        # Nom de domaine
        server_name nsmail.42.fr;

        # Dossier des fichiers WordPress
        root /var/www/wordpress;

        index index.php index.html index.htm;

        # Pour toutes les requêtes inconnues renvoie 404
        location / {
            try_files $uri $uri/ /index.php?$args;
        }

        # Redirige les fichiers PHP vers WordPress sur le port 9000
        location ~ \.php$ {
            try_files $uri =404;
            include fastcgi_params;
            fastcgi_pass wordpress:9000;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        }
    }
}